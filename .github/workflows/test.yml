name: CI

on:
  pull_request:
    branches: [ 'main' ]

  push:
    branches: [ 'main' ]

jobs:
  check_lint_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint + typecheck
        run: npm run test:ci
